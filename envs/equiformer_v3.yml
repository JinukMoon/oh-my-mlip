# candidate-reason: equiformer_v3: HOST BUILD+GPU-VERIFIED on RTX 4060 Ti sm89 (2026-06-30) via install.sh single-pass with the pinned sha below: single_point.py EquiformerV3 energy=-16.392015 eV, torch.cuda max_mem 752MB (torch 2.7.1+cu128). The vendored fairchem-core (subdirectory build, sha a7300c58) provides OCPCalculator + the EqV3 model; deps (lmdb numba torchtnt wandb pydantic huggingface_hub pymatgen hydra-core) resolve transitively, and scipy is now pinned to 1.16.0 (>=1.17 removed scipy.special.sph_harm used by the gemnet layers). Stays candidate only on GOVERNANCE: pinning atomicarchitects/equiformer_v3@a7300c58 (which REPRODUCES /TGM BIT-IDENTICAL) is pending owner approval of this immutable public sha; the build/run itself is verified.
# oh-my-mlip env recipe: Equiformer V3 (atomicarchitects/equiformer_v3 + vendored fairchem-core)
#
# Pins mirror the validated internal setup:
#   python 3.11.15 / torch 2.7.1+cu128.
# install.sh build-from-recipe is the PRIMARY install path today. (conda-pack
# tarballs are planned but not yet published; do not assume any are hosted.)
#
#   - torch is pinned to the CUDA 12.8 build (cu128) from the official PyTorch
#     wheel index; the host NVIDIA driver must satisfy the cu128 min-driver floor.
#   - cuda-nvcc 12.8.* is included so the D3 dispersion kernel can compile on
#     first run (matching the torch CUDA minor).
#   - torch-geometric and the matching torch_scatter / torch_sparse / torch_cluster
#     / torch_spline_conv (pt27cu128) wheels are the resolvable parts of the stack.
#   - The framework source needs an owner-approved immutable public pin; do not
#     install a floating git remote in a deterministic recipe.
#   - That repo VENDORS its own fairchem-core under packages/fairchem-core
#     (upstream facebookresearch/fairchem @ 977a80328f2be44649b414a9907a1d6ef2f81e95),
#     installed EDITABLE (`pip install -e packages/fairchem-core`). The editable
#     vendored build is why this recipe stays a candidate until build-verified.
#   - catbench is NOT in this recipe's pip block: install.sh installs it as a
#     post-create step (`pip install catbench==1.1.2`, WITH deps). A real build
#     showed `--no-deps` drops catbench's runtime deps (requests/xlsxwriter) and
#     breaks `catbench.adsorption`, while catbench 1.1.2 with deps does NOT
#     downgrade the pinned torch+cuXXX wheel. (A bare `--no-deps` line inside a
#     conda pip block is also an invalid requirement that breaks `conda env create`.)
# Vendored-build note: after cloning equiformer_v3 (which carries
#   packages/fairchem-core), run `pip install -e packages/fairchem-core`.
name: equiformer_v3
channels:
  - conda-forge
  - nvidia
dependencies:
  - python=3.11.15
  - pip
  # CUDA 12.8 toolchain (provides nvcc for the first-run D3 compile)
  - cuda-nvcc=12.8.*
  - ase
  - pip:
      - --extra-index-url https://download.pytorch.org/whl/cu128
      # torch_scatter +pt27cu128 wheels are on the PyG wheel index.
      - --find-links https://data.pyg.org/whl/torch-2.7.1+cu128.html
      - torch==2.7.1+cu128
      - torch-geometric==2.7.0
      - torch_scatter==2.1.2+pt27cu128
      - torch_sparse==0.6.18+pt27cu128
      - torch_cluster==1.6.3+pt27cu128
      - torch_spline_conv==1.2.2+pt27cu128
      - e3nn==0.5.6
      # scipy MUST be pinned: the vendored fairchem-core gemnet layers import
      # scipy.special.sph_harm, which scipy>=1.17 REMOVED -> an unpinned scipy
      # floats to 1.17.x and the worker fails at import with
      # "cannot import name 'sph_harm' from 'scipy.special'". 1.16.0 still ships it.
      - scipy==1.16.0
      # Vendored fairchem-core from the EquiformerV3 source tree; provides
      # `fairchem.core.OCPCalculator` used by models.json.
      - "fairchem-core @ git+https://github.com/atomicarchitects/equiformer_v3.git@a7300c58df683dc99cb48027d5bfd4c887486c48#subdirectory=packages/fairchem-core"
      # EquiformerV3 framework omitted: tgm_pinmap.json has no public git SHA.
      # Do not install floating git+https://github.com/atomicarchitects/equiformer_v3.git.
