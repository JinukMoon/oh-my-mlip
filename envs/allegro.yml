# build_status: candidate
# candidate-reason: compile-unverified (the LAMMPS-MLIAP deployment is a strictly-local C++ cmake build from mir-group/pair_nequip_allegro — public source, but no pip path)
# oh-my-mlip env recipe: Allegro (nequip-allegro)
#
# Pins mirror the validated internal setup:
#   python 3.11.13 / torch 2.8.0+cu128.
# install.sh build-from-recipe is the PRIMARY install path today. (conda-pack
# tarballs are planned but not yet published; do not assume any are hosted.)
#
#   - torch is pinned to the CUDA 12.8 build (cu128) from the official PyTorch
#     wheel index; the host NVIDIA driver must satisfy the cu128 min-driver floor.
#   - cuda-nvcc 12.8.* is included so the D3 dispersion kernel can compile on
#     first run (matching the torch CUDA minor).
#   - nequip / nequip-allegro (mir-group) are the Allegro framework packages;
#     both are public PyPI, pip-resolvable, and pinned to the validated versions.
#     The Python side of Allegro is therefore a clean pip install.
#   - The LAMMPS deployment (the only blocker) is a strictly-local C++ cmake build
#     from mir-group/pair_nequip_allegro patched into LAMMPS (libtorch + KOKKOS).
#     The source is public but there is NO pip path — it must be compiled per host
#     /GPU, which is why this recipe stays a candidate until that build is verified.
#   - catbench is NOT in this recipe's pip block: install.sh installs it as a
#     post-create step (`pip install --no-deps catbench==1.1.2`) so its pins
#     cannot downgrade torch's CUDA libraries. (A bare `--no-deps` line inside
#     a conda pip block is an invalid requirement and breaks `conda env create`.)
# LAMMPS note (not an install line): clone lammps + mir-group/pair_nequip_allegro,
#   run patch_lammps.sh, then cmake build with -DNEQUIP_AOT_COMPILE=ON -DPKG_KOKKOS=ON
#   (needs the 10 Sep 2025 LAMMPS release or newer). No pip wheel exists for this.
name: allegro
channels:
  - conda-forge
  - nvidia
dependencies:
  - python=3.11.13
  - pip
  # CUDA 12.8 toolchain (provides nvcc for the first-run D3 compile)
  - cuda-nvcc=12.8.*
  - ase
  - pip:
      - --extra-index-url https://download.pytorch.org/whl/cu128
      - torch==2.8.0+cu128
      - nequip==0.15.0
      - nequip-allegro==0.7.1
      - cuequivariance
      - cuequivariance-torch
      - e3nn
