# build_status: candidate
# candidate-reason: allegro: Python side is a clean pip install + ENERGY-VERIFIED — running the AOT-compiled .pt2 matches /TGM to 2.9e-07 eV/atom (our sm89 vs /TGM sm86). Stays candidate only because the .pt2 is a per-GPU-arch artifact: compile it on the user GPU with `nequip-compile <ckpt> <out>.nequip.pt2 --mode aotinductor --device cuda --target ase` (see docs/compile.md), not a pip line.
# oh-my-mlip env recipe: Allegro (nequip-allegro)
#
# Pins mirror the validated internal setup:
#   python 3.11.13 / torch 2.8.0+cu128.
# install.sh build-from-recipe is the PRIMARY install path today. (conda-pack
# tarballs are planned but not yet published; do not assume any are hosted.)
#
#   - torch is pinned to the CUDA 12.8 build (cu128) from the official PyTorch
#     wheel index; the host NVIDIA driver must satisfy the cu128 min-driver floor.
#   - cuda-nvcc 12.8.* is included so the D3 dispersion kernel can compile on
#     first run (matching the torch CUDA minor).
#   - nequip / nequip-allegro (mir-group) are the Allegro framework packages;
#     both are public PyPI, pip-resolvable, and pinned to the validated versions.
#     The Python side of Allegro is therefore a clean, deterministic pip install.
#   - The recipe stays candidate only because the Allegro ASE calculator loads an
#     AOT-compiled `.pt2` (NequIPCalculator.from_compiled_model) that is compiled
#     on the user GPU and not yet foreign-host build-verified (see docs/compile.md).
#   - catbench is NOT in this recipe's pip block: install.sh installs it as a
#     post-create step (`pip install catbench==1.1.2`, WITH deps). A real build
#     showed `--no-deps` drops catbench's runtime deps (requests/xlsxwriter) and
#     breaks `catbench.adsorption`, while catbench 1.1.2 with deps does NOT
#     downgrade the pinned torch+cuXXX wheel. (A bare `--no-deps` line inside a
#     conda pip block is also an invalid requirement that breaks `conda env create`.)
# LAMMPS-MLIAP MD (OPTIONAL — not needed for ASE inference): no pip wheel exists.
#   Build from PUBLIC source: clone lammps + mir-group/pair_nequip_allegro, run
#   patch_lammps.sh, then cmake with -DNEQUIP_AOT_COMPILE=ON -DPKG_KOKKOS=ON
#   (needs the 10 Sep 2025 LAMMPS release or newer).
name: allegro
channels:
  - conda-forge
  - nvidia
dependencies:
  - python=3.11.13
  - pip
  # CUDA 12.8 toolchain (provides nvcc for the first-run D3 compile)
  - cuda-nvcc=12.8.*
  - ase
  - pip:
      - --extra-index-url https://download.pytorch.org/whl/cu128
      - torch==2.8.0+cu128
      - nequip==0.15.0
      - nequip-allegro==0.7.1
      - cuequivariance==0.8.1
      - cuequivariance-torch==0.8.1
      # the cueq OPS kernels provide the tensor_product op schemas the AOT
      # .pt2 needs at load (without them: 'Could not find schema for
      # cuequivariance::tensor_product_uniform_1d_jit').
      - cuequivariance-ops-cu12==0.8.1
      - cuequivariance-ops-torch-cu12==0.8.1
      - e3nn==0.5.7
      # (LAMMPS-MLIAP MD is an optional host cmake build — see the note above;
      #  it is NOT a pip dependency and is not required for ASE inference.)
