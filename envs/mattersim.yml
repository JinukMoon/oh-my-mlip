# build_status: clean
# oh-my-mlip env recipe: MatterSim (mattersim)
#
# Validated, buildable recipe. Pins mirror the validated internal setup:
#   python 3.10.16 / torch 2.6.0+cu124.
# install.sh build-from-recipe is the PRIMARY install path today. (conda-pack
# tarballs are planned but not yet published; do not assume any are hosted.)
#
#   - torch is pinned to the CUDA 12.4 build (cu124) from the official PyTorch
#     wheel index; the host NVIDIA driver must satisfy the cu124 min-driver floor.
#   - cuda-nvcc 12.4.* is included so the D3 dispersion kernel can compile on
#     first run (matching the torch CUDA minor).
#   - mattersim is installed from its validated git sha; torch-geometric and e3nn
#     are top-level deps it needs.
#   - catbench is NOT in this recipe's pip block: install.sh installs it as a
#     post-create step (`pip install --no-deps catbench==1.1.2`) so its pins
#     cannot downgrade torch's CUDA libraries. (A bare `--no-deps` line inside
#     a conda pip block is an invalid requirement and breaks `conda env create`.)
name: mattersim
channels:
  - conda-forge
  - nvidia
dependencies:
  - python=3.10.16
  - pip
  # CUDA 12.4 toolchain (provides nvcc for the first-run D3 compile)
  - cuda-nvcc=12.4.*
  - ase
  - pip:
      - --extra-index-url https://download.pytorch.org/whl/cu124
      - torch==2.6.0+cu124
      - mattersim @ git+https://github.com/microsoft/mattersim.git@bf13be6f6fd470fd4e299855c755ad13968620bb
      - torch-geometric==2.6.1
      - e3nn
