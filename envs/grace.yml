# build_status: clean
# oh-my-mlip env recipe: GRACE (tensorpotential)
#
# Pins mirror the validated internal setup:
#   python 3.11.11 / torch 2.5.1+cu121.
# install.sh build-from-recipe is the PRIMARY install path today. (conda-pack
# tarballs are planned but not yet published; do not assume any are hosted.)
#
#   - torch is pinned to the CUDA 12.1 build (cu121) from the official PyTorch
#     wheel index; the host NVIDIA driver must satisfy the cu121 min-driver floor.
#   - cuda-nvcc 12.1.* is included so the D3 dispersion kernel can compile on
#     first run (matching the torch CUDA minor).
#   - GRACE runs on TensorFlow; tensorflow 2.16.2 is its top-level runtime dep.
#   - The framework package, tensorpotential (ICAMS/grace-tensorpotential), is
#     the public PyPI package `tensorpotential` (==0.5.3 in the validated setup)
#     — pip-installable, no compile. The validated env installed it from a local
#     checkout, but the same version is on public PyPI. Needs legacy Keras:
#     export TF_USE_LEGACY_KERAS=1 if keras>=3.0 is present.
#   - catbench is NOT in this recipe's pip block: install.sh installs it as a
#     post-create step (`pip install catbench==1.1.2`, WITH deps). A real build
#     showed `--no-deps` drops catbench's runtime deps (requests/xlsxwriter) and
#     breaks `catbench.adsorption`, while catbench 1.1.2 with deps does NOT
#     downgrade the pinned torch+cuXXX wheel. (A bare `--no-deps` line inside a
#     conda pip block is also an invalid requirement that breaks `conda env create`.)
name: grace
channels:
  - conda-forge
  - nvidia
dependencies:
  - python=3.11.11
  - pip
  # CUDA 12.1 toolchain (provides nvcc for the first-run D3 compile)
  - cuda-nvcc=12.1.*
  - ase
  - pip:
      - --extra-index-url https://download.pytorch.org/whl/cu121
      - torch==2.5.1+cu121
      - tensorflow==2.16.2
      # GRACE framework (ICAMS/grace-tensorpotential): public PyPI, no compile.
      - tensorpotential==0.5.3
