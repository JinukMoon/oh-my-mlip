# build_status: clean
# oh-my-mlip env recipe: GRACE (tensorpotential) — TensorFlow backend
#
# Pins mirror the validated internal setup + the OFFICIAL GRACE install
# (gracemaker.readthedocs.io): python 3.11 / tensorflow[and-cuda]==2.16.2 /
# tensorpotential==0.5.3 — all PUBLIC PyPI. install.sh build-from-recipe is the
# PRIMARY path. (conda-pack tarballs are planned but not yet hosted.)
#
#   - GRACE is TensorFlow-ONLY — the upstream docs state there is NO PyTorch
#     dependency. The validated /TGM env carried torch only for the optional D3
#     dispersion correction; GRACE itself does not need it. Dropping torch removes
#     the tensorflow[and-cuda] <-> torch+cu121 nvidia-cuda-nvrtc-cu12 conflict that
#     made the earlier torch-bundled recipe fail to resolve, so this recipe is a
#     clean single-pass pip install. (D3 is simply unavailable for GRACE; catbench
#     runs fine without it.)
#   - tensorflow[and-cuda]==2.16.2 is the upstream-recommended GPU pin (avoids a
#     known >2.16 GPU memory-leak); it bundles its own nvidia-cu12 wheels, so no
#     system CUDA toolkit / --extra-index-url is needed.
#   - Needs legacy Keras: the worker/runtime must `export TF_USE_LEGACY_KERAS=1`
#     when keras>=3.0 is present (tf_keras is pulled in as a dep).
#   - Weights: fetch the foundation model with the official CLI
#     `grace_models download GRACE-2L-OAM` (-> $HOME/.cache/grace, override via
#     GRACE_CACHE); load via `from tensorpotential.calculator import TPCalculator`.
#   - catbench is NOT in this recipe's pip block: install.sh installs it as a
#     post-create step (`pip install catbench==1.1.2`, WITH deps).
name: grace
channels:
  - conda-forge
dependencies:
  - python=3.11.11
  - pip
  - ase
  - pip:
      # TensorFlow-only stack (no torch -> no nvrtc conflict). Public PyPI.
      - tensorflow[and-cuda]==2.16.2
      - tensorpotential==0.5.3
