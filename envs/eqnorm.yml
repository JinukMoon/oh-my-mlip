# build_status: clean
# oh-my-mlip env recipe: EqNorm (eqnorm)
#
# Validated, buildable recipe. Pins mirror the validated internal setup:
#   python 3.11.13 / torch 2.6.0+cu118.
# install.sh build-from-recipe is the PRIMARY install path today. (conda-pack
# tarballs are planned but not yet published; do not assume any are hosted.)
#
#   - torch is pinned to the CUDA 11.8 build (cu118) from the official PyTorch
#     wheel index; the host NVIDIA driver must satisfy the cu118 min-driver floor.
#   - cuda-nvcc 11.8.* is included so the D3 dispersion kernel can compile on
#     first run (matching the torch CUDA minor).
#   - eqnorm is installed from its validated git sha; torch-geometric,
#     torch-scatter (pt26cu118 wheel) and vesin are top-level deps it needs.
#   - catbench is NOT in this recipe's pip block: install.sh installs it as a
#     post-create step (`pip install catbench==1.1.2`, WITH deps). A real build
#     showed `--no-deps` drops catbench's runtime deps (requests/xlsxwriter) and
#     breaks `catbench.adsorption`, while catbench 1.1.2 with deps does NOT
#     downgrade the pinned torch+cuXXX wheel. (A bare `--no-deps` line inside a
#     conda pip block is also an invalid requirement that breaks `conda env create`.)
name: eqnorm
channels:
  - conda-forge
  - nvidia
dependencies:
  - python=3.11.13
  - pip
  # CUDA 11.8 toolchain (provides nvcc for the first-run D3 compile)
  - cuda-nvcc=11.8.*
  # ase pinned to the validated /TGM version (unpinned ase floats to a breaking release)
  - ase=3.25.0
  - pip:
      - --extra-index-url https://download.pytorch.org/whl/cu118
      # torch-scatter's +ptXXcuYYY wheels live on the PyG wheel index, not the
      # pytorch index — without this find-links the pinned wheel is "not found".
      - --find-links https://data.pyg.org/whl/torch-2.6.0+cu118.html
      - torch==2.6.0+cu118
      - eqnorm @ git+https://github.com/yzchen08/eqnorm.git@57527db44fee9fab3fb5775dd860ca4bbe014f44
      - torch-geometric==2.6.1
      - torch-scatter==2.1.2+pt26cu118
      - e3nn==0.5.6
      - vesin==0.3.7
      # setuptools<81 still ships pkg_resources (matches /TGM); newer removed it.
      - setuptools==78.1.1
