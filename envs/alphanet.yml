# build_status: clean
# oh-my-mlip env recipe: AlphaNet (alphanet)
#
# Pins mirror the validated internal setup:
#   python 3.11.13 / torch 2.1.2+cu121.
# install.sh build-from-recipe is the PRIMARY install path today. (conda-pack
# tarballs are planned but not yet published; do not assume any are hosted.)
#
#   - torch is pinned to the CUDA 12.1 build (cu121) from the official PyTorch
#     wheel index; the host NVIDIA driver must satisfy the cu121 min-driver floor.
#   - cuda-nvcc 12.1.* is included so the D3 dispersion kernel can compile on
#     first run (matching the torch CUDA minor).
#   - torch-scatter is pinned to the matching pt21cu121 wheel that AlphaNet needs.
#   - The AlphaNet framework is the public GPL-3.0 package zmyybc/AlphaNet,
#     installed via pip from its git remote (no compile step — pure pip).
#   - catbench is installed LAST, with --no-deps, to avoid its dependency pins
#     downgrading torch's CUDA libraries.
name: alphanet
channels:
  - conda-forge
  - nvidia
dependencies:
  - python=3.11.13
  - pip
  # CUDA 12.1 toolchain (provides nvcc for the first-run D3 compile)
  - cuda-nvcc=12.1.*
  - ase
  - pip:
      - --extra-index-url https://download.pytorch.org/whl/cu121
      - torch==2.1.2+cu121
      - torch-geometric==2.6.1
      - torch-scatter==2.1.2+pt21cu121
      # AlphaNet framework (GPL-3.0): public git, pip-installable, no compile.
      - alphanet @ git+https://github.com/zmyybc/AlphaNet.git
      # catbench LAST and isolated; see header note.
      - --no-deps
      - catbench==1.1.2
