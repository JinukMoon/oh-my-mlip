# build_status: clean
# build_note: nequix: HOST tier-2 GPU PASS (RTX 4060 Ti sm89, 2026-06-30) via the JAX backend — NequixCalculator(...nequix-mp-1.nqx, backend='jax', use_kernel=False) energy=-16.378962 eV on jax CudaDevice. nequix is JAX-native; OpenEquivariance is OPTIONAL and is INTENTIONALLY OMITTED here (its 0.6.4 sdist won't build on this host; use_kernel=False uses e3nn-jax instead). The single conda env create installs cleanly now that oeq is removed.
# oh-my-mlip env recipe: Nequix (nequix, JAX-based)
#
# Pins mirror the validated internal setup (torch/jax), with python bumped
# 3.10.20 -> 3.11.13 (host-reverified 2026-07-16, energy identical):
#   python 3.11.13 / torch 2.10.0+cu126.
# WHY 3.11: cp310 torch wheels on download.pytorch.org route to
# download-r2.pytorch.org, which some site firewalls TLS-block (beta-test
# finding, 2026-07); cp311+ wheels are served by the primary host.
# install.sh build-from-recipe is the PRIMARY install path today. (conda-pack
# tarballs are planned but not yet published; do not assume any are hosted.)
#
#   - Nequix runs on JAX; torch is pinned to the CUDA 12.6 build (cu126) from the
#     official PyTorch wheel index because parts of the stack still link torch.
#     The host NVIDIA driver must satisfy the cu126 min-driver floor.
#   - cuda-nvcc 12.6.* is included so the D3 dispersion kernel can compile on
#     first run AND so openequivariance can build its CUDA extensions.
#   - nequix is pinned to the validated version; jax==0.6.2 plus the
#     jax-cuda12-plugin / jax-cuda12-pjrt CUDA plugins provide the JAX GPU backend.
#     e3nn-jax and equinox are top-level deps it needs.
#   - openequivariance (+ its extjax variant) ships sdist-only and compiles
#     against nvcc + torch at install time; this is why the build is candidate.
#   - catbench is NOT in this recipe's pip block: install.sh installs it as a
#     post-create step (`pip install catbench==1.1.2`, WITH deps). A real build
#     showed `--no-deps` drops catbench's runtime deps (requests/xlsxwriter) and
#     breaks `catbench.adsorption`, while catbench 1.1.2 with deps does NOT
#     downgrade the pinned torch+cuXXX wheel. (A bare `--no-deps` line inside a
#     conda pip block is also an invalid requirement that breaks `conda env create`.)
name: nequix
channels:
  - conda-forge
  - nvidia
dependencies:
  - python=3.11.13
  - pip
  # CUDA 12.6 toolchain (provides nvcc for D3 and for openequivariance's build)
  - cuda-nvcc=12.6.*
  - ase
  - pip:
      - --extra-index-url https://download.pytorch.org/whl/cu126
      - torch==2.10.0+cu126
      - nequix==0.4.3
      - jax==0.6.2
      - jax-cuda12-plugin==0.6.2
      - jax-cuda12-pjrt==0.6.2
      - jaxlib==0.6.2
      - e3nn-jax==0.20.8
      - equinox==0.13.6
      # openequivariance / openequivariance_extjax INTENTIONALLY OMITTED: oeq is
      # OPTIONAL (upstream `pip install nequix[oeq]`), its 0.6.4 sdist fails a
      # nanobind/CMake build on this host (no cp310 wheel), and it is NOT needed.
      # The default JAX backend runs WITHOUT kernels via use_kernel=False
      # (e3nn-jax tensor products), which is the verified path here. torch torch
      # is kept only for nequix's optional torch backend import; the verified
      # single-point uses backend='jax'.
