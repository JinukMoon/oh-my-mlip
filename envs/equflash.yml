# build_status: candidate
# candidate-reason: flashTP_e3nn is a local file:// build (no pip source) — must be built locally; upstream unknown
# oh-my-mlip env recipe: EquFlash (fairchem-core + flashTP)
#
# Pins mirror the validated internal setup:
#   python 3.12.13 / torch 2.9.1+cu126.
# install.sh build-from-recipe is the PRIMARY install path today. (conda-pack
# tarballs are planned but not yet published; do not assume any are hosted.)
#
#   - torch is pinned to the CUDA 12.6 build (cu126) from the official PyTorch
#     wheel index; the host NVIDIA driver must satisfy the cu126 min-driver floor.
#   - cuda-nvcc 12.6.* is included so the D3 dispersion kernel can compile on
#     first run (matching the torch CUDA minor).
#   - fairchem-core, torch-geometric and the matching torch_scatter / torch_sparse
#     (pt29cu126) wheels are the resolvable parts of the stack.
#   - The validated internal env carries flashTP_e3nn from a LOCAL file:// path
#     (the flash tensor-product kernel) with no public index, and a GGNN editable
#     git checkout. flashTP_e3nn is the hard blocker: it is a compiled local
#     artifact, so it is omitted here.
#   - catbench is installed LAST, with --no-deps, to avoid its dependency pins
#     downgrading torch's CUDA libraries.
# TODO-owner: flashTP_e3nn source (build script or public wheel/git URL) — the
#   recorded install is a local file:// artifact with no public source.
name: equflash
channels:
  - conda-forge
  - nvidia
dependencies:
  - python=3.12.13
  - pip
  # CUDA 12.6 toolchain (provides nvcc for the first-run D3 compile)
  - cuda-nvcc=12.6.*
  - ase
  - pip:
      - --extra-index-url https://download.pytorch.org/whl/cu126
      - torch==2.9.1+cu126
      - fairchem-core==1.10.0
      - torch-geometric==2.6.1
      - torch_scatter==2.1.2+pt29cu126
      - torch_sparse==0.6.18+pt29cu126
      - e3nn
      # flashTP_e3nn (flash tensor-product kernel) is a local build; see TODO-owner.
      # catbench LAST and isolated; see header note.
      - --no-deps
      - catbench==1.1.2
