# build_status: candidate
# candidate-reason: compile-unverified (EquFlash v1's flashTP_e3nn is a CUDA source build from SNU-ARC/flashTP; v2 is cueq-only and may be clean once build-verified)
# oh-my-mlip env recipe: EquFlash (SamsungDS/GGNN; flashTP v1 only)
#
# Pins mirror the validated internal setup:
#   python 3.12.13 / torch 2.9.1+cu126.
# install.sh build-from-recipe is the PRIMARY install path today. (conda-pack
# tarballs are planned but not yet published; do not assume any are hosted.)
#
#   - torch is pinned to the CUDA 12.6 build (cu126) from the official PyTorch
#     wheel index; the host NVIDIA driver must satisfy the cu126 min-driver floor.
#   - cuda-nvcc 12.6.* is included so the D3 dispersion kernel can compile on
#     first run (matching the torch CUDA minor).
#   - fairchem-core, torch-geometric and the matching torch_scatter / torch_sparse
#     (pt29cu126) wheels are the resolvable parts of the stack.
#   - The framework is the public SamsungDS/GGNN package. EquFlashV2 is cueq-only
#     (FullConv uses cuequivariance exclusively), so the cuequivariance==0.6.0
#     pins from GGNN's requirements.txt are the resolvable runtime for v2.
#   - flashTP (SNU-ARC/flashTP, MIT) is a CUDA source build (~10 min) and is
#     needed ONLY by EquFlash v1's flashtp backend — not by v2. It is the
#     compile blocker that keeps this recipe a candidate until build-verified.
#   - catbench is NOT in this recipe's pip block: install.sh installs it as a
#     post-create step (`pip install --no-deps catbench==1.1.2`) so its pins
#     cannot downgrade torch's CUDA libraries. (A bare `--no-deps` line inside
#     a conda pip block is an invalid requirement and breaks `conda env create`.)
# Compile note: EquFlash v1 needs `git clone https://github.com/SNU-ARC/flashTP &&
#   pip install . --no-build-isolation` (CUDA compile). V2 does NOT need flashTP.
name: equflash
channels:
  - conda-forge
  - nvidia
dependencies:
  - python=3.12.13
  - pip
  # CUDA 12.6 toolchain (provides nvcc for the first-run D3 compile)
  - cuda-nvcc=12.6.*
  - ase
  - pip:
      - --extra-index-url https://download.pytorch.org/whl/cu126
      - torch==2.9.1+cu126
      - fairchem-core==1.10.0
      - torch-geometric==2.6.1
      - torch_scatter==2.1.2+pt29cu126
      - torch_sparse==0.6.18+pt29cu126
      - e3nn
      # EquFlashV2 runtime is cueq-only; cuequivariance pins from GGNN reqs.
      - cuequivariance==0.6.0
      - cuequivariance-torch==0.6.0
      - cuequivariance-ops-torch-cu12==0.6.0
      # GGNN framework package (public): SamsungDS/GGNN.
      - GGNN @ git+https://github.com/SamsungDS/GGNN.git
      # flashTP (SNU-ARC/flashTP) is a v1-only CUDA source build; see compile note.
