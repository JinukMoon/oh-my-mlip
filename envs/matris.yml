# build_status: candidate
# candidate-reason: matris: HOST tier-1 CPU PASS (RTX 4060 Ti box, 2026-06-30): builds + imports + computes energy/forces on CPU (energy=-16.386652 eV). Stays candidate for two reasons: (1) GPU driver-skew — torch 2.12.1+cu130 needs a CUDA-13-class driver; this CUDA-12.8 host runs CPU-only, so GPU inference is unverified here; (2) MatRIS is NOT in /TGM, so there is no reference checkpoint to compare against. Weight (~/.cache/matris/MatRIS_10M_OAM.pth.tar, sha256 c033abc5.., 42273174 B) is pre-staged by scripts/prestage_matris_weights.py, which verifies the sha warn-only (upstream figshare file may be re-published).
# oh-my-mlip env recipe: MatRIS (matris)
#
# Pins mirror the validated internal setup:
#   python 3.11.15 / torch 2.12.1+cu130.
# install.sh build-from-recipe is the PRIMARY install path today. (conda-pack
# tarballs are planned but not yet published; do not assume any are hosted.)
#
#   - torch is pinned to the CUDA 13.0 build (cu130) from the official PyTorch
#     wheel index; the host NVIDIA driver must satisfy the cu130 min-driver floor.
#   - cuda-nvcc 13.0.* is included so the D3 dispersion kernel can compile on
#     first run (matching the torch CUDA minor).
#   - matris is installed from its public git sha (resolvable). The recipe is
#     marked candidate only because this exact pin set has not yet been
#     build-verified end to end; there is no owner-blocked dependency.
#   - catbench is NOT in this recipe's pip block: install.sh installs it as a
#     post-create step (`pip install catbench==1.1.2`, WITH deps). A real build
#     showed `--no-deps` drops catbench's runtime deps (requests/xlsxwriter) and
#     breaks `catbench.adsorption`, while catbench 1.1.2 with deps does NOT
#     downgrade the pinned torch+cuXXX wheel. (A bare `--no-deps` line inside a
#     conda pip block is also an invalid requirement that breaks `conda env create`.)
name: matris
channels:
  - conda-forge
  - nvidia
dependencies:
  - python=3.11.15
  - pip
  # CUDA 13.0 toolchain (provides nvcc for the first-run D3 compile)
  - cuda-nvcc=13.0.*
  - ase
  - pip:
      - --extra-index-url https://download.pytorch.org/whl/cu130
      - torch==2.12.1+cu130
      - matris @ git+https://github.com/HPC-AI-Team/MatRIS@c16f569ca08e6905e91b64e2ee68614303e46f7f
