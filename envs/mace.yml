# oh-my-mlip env recipe: MACE (mace-torch)
#
# Build-from-recipe FALLBACK for the MACE env. PRIMARY distribution is the
# relocatable conda-pack tarball (see dist_manifest.json); this recipe is what
# install.sh uses when the tarball path is unavailable or the host needs a
# host-correct rebuild.
#
# Pins mirror the validated internal setup (MACE: python 3.10, torch cu118).
#   - torch is pinned to a CUDA 11.8 build (cu118) so the bundled CUDA runtime
#     matches the validated D3 kernel; the host NVIDIA driver must satisfy the
#     min-driver floor recorded in dist_manifest.json.
#   - catbench is installed LAST, with --no-deps, to avoid its dependency pins
#     downgrading torch's CUDA libraries (a known footgun; see internal notes).
#   - MACE checkpoints (mace-mpa-0, mace-mh-1) are open-weight and fetched on
#     first run; no weights are bundled in this recipe.
name: mace
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.10
  - pip
  # CUDA 11.8 toolchain (provides nvcc for the first-run D3 compile)
  - pytorch-cuda=11.8
  - pytorch=2.4.*
  - cuda-nvcc=11.8.*
  - numpy<2
  - ase>=3.23
  - pip:
      - mace-torch
      # catbench LAST and isolated; see header note.
      - --no-deps
      - catbench
