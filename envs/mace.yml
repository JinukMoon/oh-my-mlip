# build_status: clean
# oh-my-mlip env recipe: MACE (mace-torch)
#
# Validated, buildable recipe. Pins mirror the validated internal setup:
#   python 3.11.13 / torch 2.7.1+cu126.
# install.sh build-from-recipe is the PRIMARY install path today. (conda-pack
# tarballs are planned but not yet published; do not assume any are hosted.)
#
#   - torch is pinned to the CUDA 12.6 build (cu126) from the official PyTorch
#     wheel index; the host NVIDIA driver must satisfy the cu126 min-driver floor.
#   - cuda-nvcc 12.6.* is included so the D3 dispersion kernel can compile on
#     first run (matching the torch CUDA minor).
#   - mace-torch is pinned to the validated git sha.
#   - cuequivariance / e3nn are top-level deps MACE needs; small transitive deps
#     are left to float.
#   - catbench is NOT in this recipe's pip block: install.sh installs it as a
#     post-create step (`pip install --no-deps catbench==1.1.2`) so its pins
#     cannot downgrade torch's CUDA libraries. (A bare `--no-deps` line inside
#     a conda pip block is an invalid requirement and breaks `conda env create`.)
#   - MACE checkpoints (mace-mpa-0, mace-mh-1) are open-weight and fetched on
#     first run; no weights are bundled in this recipe.
name: mace
channels:
  - conda-forge
  - nvidia
dependencies:
  - python=3.11.13
  - pip
  # CUDA 12.6 toolchain (provides nvcc for the first-run D3 compile)
  - cuda-nvcc=12.6.*
  - ase
  - pip:
      - --extra-index-url https://download.pytorch.org/whl/cu126
      - torch==2.7.1+cu126
      - mace-torch @ git+https://github.com/ACEsuit/mace.git@100a29149d90a5945eddec1f0940bd88a6e3b363
      - cuequivariance
      - cuequivariance-torch
      - e3nn
