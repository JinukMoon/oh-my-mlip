# build_status: candidate
# candidate-reason: tace: the TACE C/CUDA extension COMPILED on a CUDA-12.8 box and CPU single-point matches /TGM to 1.9e-06 eV/atom (TESTED). Only cu130 GPU inference is unverified here (torch 2.11.0+cu130 needs an NVIDIA driver at the CUDA-13 floor; our box is CUDA 12.8 -> ran CPU).
# oh-my-mlip env recipe: TACE (tace)
#
# Pins mirror the validated internal setup:
#   python 3.11.15 / torch 2.11.0+cu130.
# install.sh build-from-recipe is the PRIMARY install path today. (conda-pack
# tarballs are planned but not yet published; do not assume any are hosted.)
#
#   - torch is pinned to the CUDA 13.0 build (cu130) from the official PyTorch
#     wheel index; the host NVIDIA driver must satisfy the cu130 min-driver floor.
#   - cuda-nvcc 13.0.* is included so the D3 dispersion kernel can compile on
#     first run (matching the torch CUDA minor).
#   - torch-geometric and e3nn are resolvable top-level deps of the stack.
#   - The framework package TACE is the PUBLIC github.com/xvzemin/tace repo,
#     pinned to the exact commit the validated setup used (2b2214e0...). It is a
#     deterministic public source; the recipe stays candidate only because the
#     C/CUDA extension build is not yet foreign-host-verified.
#   - catbench is NOT in this recipe's pip block: install.sh installs it as a
#     post-create step (`pip install catbench==1.1.2`, WITH deps). A real build
#     showed `--no-deps` drops catbench's runtime deps (requests/xlsxwriter) and
#     breaks `catbench.adsorption`, while catbench 1.1.2 with deps does NOT
#     downgrade the pinned torch+cuXXX wheel. (A bare `--no-deps` line inside a
#     conda pip block is also an invalid requirement that breaks `conda env create`.)
name: tace
channels:
  - conda-forge
  - nvidia
dependencies:
  - python=3.11.15
  - pip
  # CUDA 13.0 toolchain (provides nvcc for the first-run D3 compile)
  - cuda-nvcc=13.0.*
  - ase
  - pip:
      - --extra-index-url https://download.pytorch.org/whl/cu130
      - torch==2.11.0+cu130
      - torch-geometric==2.8.0
      - e3nn==0.6.0
      # TACE framework (public github.com/xvzemin/tace, pinned sha): C/CUDA build.
      - TACE @ git+https://github.com/xvzemin/tace.git@2b2214e040207b559d6bb4f92072ec1299827ba0
