name: CI (GPU-free)

# Runs on every push and pull request. No GPU, no conda env, no multi-GB
# model downloads required. All steps complete on a standard GitHub-hosted
# ubuntu runner in under 5 minutes.
#
# Steps:
#   1. Checkout repository
#   2. Set up Python 3.11
#   3. Install dev dependencies (pytest, jsonschema)
#   4. JSON-schema validate models.json + dist_manifest.json
#   5. shellcheck install.sh + scripts/*.sh
#   6. ast.parse every inference/import string in models.json (no exec)
#   7. Status-table sync: gen_status_table.py --check
#   8. Recipe determinism gate: verify_determinism.py
#   9. pytest tests/ (all unit tests, no GPU)
#   10. Registry integrity / trust-boundary negative tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  gpu-free-ci:
    name: GPU-free PR checks
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v5

      # ── 2. Set up Python ─────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      # ── 3. Install dev dependencies ──────────────────────────────────────────
      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      # ── 4. JSON-schema validate registries ───────────────────────────────────
      # The models schema enforces the four honesty fields (gated, weights,
      # validation, inference) on every version entry (overclaim guard).
      # The dist_manifest schema enforces the six distribution keys.
      - name: Validate models.json and dist_manifest.json schemas
        run: |
          python -m pytest tests/test_schemas.py -v \
            --tb=short \
            -p no:cacheprovider

      # ── 5. shellcheck ─────────────────────────────────────────────────────────
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: shellcheck install.sh and scripts/*.sh
        run: |
          shellcheck install.sh
          find scripts -maxdepth 1 -name "*.sh" -type f | sort | while read -r f; do
            shellcheck "$f"
          done

      # ── 6. ast.parse inference/import strings (trust boundary, no exec) ──────
      # Catches Python syntax errors in models.json inference/import lines
      # without executing any code and without needing torch/ase/conda.
      - name: ast.parse all inference and import strings in models.json
        run: |
          python -m pytest tests/test_inference_parses.py -v \
            --tb=short \
            -p no:cacheprovider

      # ── 7. Status-table sync ──────────────────────────────────────────────────
      # Fails if either generated view diverges from models.json: the light
      # README ## Supported MLIPs list OR the detailed docs/model_status.md
      # table. Overclaim guard: both are generated from validation/weights/gated,
      # so "all-validated" overclaims can never silently persist.
      - name: Check status lists (README + docs/model_status.md) are in sync with models.json
        run: python scripts/gen_status_table.py --check

      # ── 7a. Recipe determinism gate ──────────────────────────────────────────
      # Fails on bare pip requirements, range pins, or git installs without an
      # exact commit SHA. Candidate recipes may only document private file://
      # sources; clean recipes must be fully reproducible.
      - name: Verify env recipes use deterministic pip requirements
        run: python scripts/verify_determinism.py

      # ── 7b. Secret scan: no HF token literal anywhere in the tree ─────────────
      # Scans the working tree (tracked + untracked) for hf_<20+> token shapes.
      # The matched value is redacted in output. See docs/hf_token.md.
      - name: Verify no Hugging Face token literal leaked
        run: python scripts/verify_no_token.py

      # ── 7c. Accel-block shape check (GPU-free, honesty contract) ──────────────
      # Asserts every models.json `accel` block is GPU-UNVERIFIED (verified=false,
      # last_gpu_verified=null, recognized provenance) and prints the
      # "shape-only; gpu_unverified" banner. No GPU / torch / conda. See
      # docs/compile.md.
      - name: Verify accel blocks honor the GPU-unverified contract
        run: python scripts/verify_compile.py

      # ── 7d. Weight-integrity table (GPU-free) ────────────────────────────────
      # Renders the recorded validated fingerprints (downloaded == validated).
      # No download/hash here — just confirms the table runs and the registry
      # parses. See docs/weights_integrity.md.
      - name: Weight-integrity fingerprint table
        run: python scripts/verify_weights_integrity.py

      # ── 8. Full pytest suite ─────────────────────────────────────────────────
      - name: Run all tests (no GPU)
        run: |
          python -m pytest tests/ -q \
            --tb=short \
            -p no:cacheprovider

      # ── 9. Integrity / negative tests ─────────────────────────────────────────
      # Explicitly call out the negative tests so CI failure messages are clear.
      # (These are already included in step 8 above; this step adds a named
      # summary that makes PR check output easier to read.)
      - name: Registry integrity and trust-boundary negative tests
        run: |
          python -m pytest tests/test_registry_integrity.py -v \
            --tb=short \
            -p no:cacheprovider

  # ── GPU smoke test (self-hosted, non-blocking) ────────────────────────────────
  # Runs on the maintainer's registered self-hosted GPU runner (labels:
  # self-hosted + gpu). The runner's .env provides OH_MY_MLIP_HOME pointing at
  # the live hub (built envs + weight caches), so the freshly checked-out code
  # is smoke-tested against real envs. Non-blocking: continue-on-error keeps
  # PRs mergeable when the runner is offline.
  gpu-smoke-test:
    name: GPU smoke test (self-hosted, non-blocking)
    runs-on: [self-hosted, gpu]
    needs: gpu-free-ci
    continue-on-error: true
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - name: MACE single-point on GPU (hub env)
        run: |
          "$OH_MY_MLIP_HOME/envs/mace/bin/python" run_examples/single_point.py MACE
      - name: SevenNet single-point on GPU (hub env)
        run: |
          "$OH_MY_MLIP_HOME/envs/sevennet/bin/python" run_examples/single_point.py SevenNet
